<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Exercise1.css">
        <title>Document</title>
    </head>
    <body>
        <div id="top">
            <div id="title1">
                <h1>Exercice 1</h1>
            </div>
            <div id="title2">
                <h2>Indiquer le doigté à partir de la note</h2>
            </div>
        </div>
        
        <hr>
        <div id="home-button">
            <a href="../../../../index.html"><img src="../../../../Images/home.png" height="40"></a>
        </div>

        <div id="info">
            <div id="my-timer">
                00:00:00:00
            </div>
        </div>

        <div id="difficulties">
            <div id="difficultiesText">
                Choissisez votre difficulté
            </div>
            <div id="easyDifficulty">
                <button onclick="setDifficulty(`easy`);startProgram()">Façile</button>
            </div>
            <div id="mediumDifficulty">
                <button onclick="setDifficulty(`medium`);startProgram()">Moyen</button>
            </div>
            <div id="hardDifficulty">
                <button onclick="setDifficulty(`hard`);startProgram()">Difficile</button>
            </div>
        </div>

        <div id="main-container">
            <div id="saxophone-container">
                <div id="noteTextDiv">
                    <p id="noteText">
                        display text 
                    </p>
                </div>
                <div id="scoreTextDiv">
                    <p id="scoreText">
                        score: 0/0
                    </p>
                </div>
                <div id="saxophone-image">
                    <img src="../../../../Images/saxophone-fingerings.png" height="500px">
                </div>
                <div id="keys">
                    <div id="key1" class="key main-key">
                        <input type="checkbox" id="key1-input" class="input-key main-input-key" onclick="changeImage(`key1`); addToList(`key1`)">
                        <img id="key1-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/main-key.png">
                    </div>

                    <div id="key2" class="key main-key">
                        <input type="checkbox" id="key2-input" class="input-key main-input-key" onclick="changeImage(`key2`); addToList(`key2`)">
                        <img id="key2-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/main-key.png">
                    </div>

                    <div id="key3" class="key main-key">
                        <input type="checkbox" id="key3-input" class="input-key main-input-key" onclick="changeImage(`key3`); addToList(`key3`)">
                        <img id="key3-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/main-key.png">
                    </div>

                    <div id="key4" class="key main-key">
                        <input type="checkbox" id="key4-input" class="input-key main-input-key" onclick="changeImage(`key4`); addToList(`key4`)">
                        <img id="key4-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/main-key.png">
                    </div>

                    <div id="key5" class="key main-key">
                        <input type="checkbox" id="key5-input" class="input-key main-input-key" onclick="changeImage('key5'); addToList('key5')">
                        <img id="key5-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/main-key.png">
                    </div>

                    <div id="key6" class="key main-key">
                        <input type="checkbox" id="key6-input" class="input-key main-input-key" onclick="changeImage('key6'); addToList('key6')">
                        <img id="key6-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/main-key.png">
                    </div>

                    <div id="low-c-key" class="key">
                        <input type="checkbox" class="input-key" id="low-c-key-input" onclick="changeImage('low-c-key'); addToList('low-c-key')">
                        <img id="low-c-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/low-c-key.png">
                    </div>
                    
                    <div id="eb-key" class="key">
                        <input type="checkbox" class="input-key" id="eb-key-input" onclick="changeImage('eb-key'); addToList('eb-key')">
                        <img id="eb-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/eb-key.png">
                    </div>

                    <div id="bb-key" class="key">
                        <input type="checkbox" class="input-key" id="bb-key-input" onclick="changeImage('bb-key'); addToList('bb-key')">
                        <img id="bb-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/bb-key.png">
                    </div>

                    <div id="alt-bb-key" class="key">
                        <input type="checkbox" class="input-key" id="alt-bb-key-input" onclick="changeImage('alt-bb-key'); addToList('alt-bb-key')">
                        <img id="alt-bb-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/alt-bb-key.png">
                    </div>

                    <div id="alt-c-key" class="key">
                        <input type="checkbox" class="input-key" id="alt-c-key-input" onclick="changeImage('alt-c-key'); addToList('alt-c-key')">
                        <img id="alt-c-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/alt-c-key.png">
                    </div>

                    <div id="high-e-key" class="key">
                        <input type="checkbox" class="input-key" id="high-e-key-input" onclick="changeImage('high-e-key'); addToList('high-e-key')">
                        <img id="high-e-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/high-e-key.png">
                    </div>

                    <div id="high-fsharp-key" class="key">
                        <input type="checkbox" class="input-key" id="high-fsharp-key-input" onclick="changeImage('high-fsharp-key'); addToList('high-fsharp-key')">
                        <img id="high-fsharp-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/high-fsharp-key.png">
                    </div>

                    <div id="alt-fsharp-key" class="key">
                        <input type="checkbox" class="input-key" id="alt-fsharp-key-input" onclick="changeImage('alt-fsharp-key'); addToList('alt-fsharp-key')">

                        <img id="octave-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/octave-key.png">
                    </div>

                    <div id="front-f-key" class="key">
                        <input type="checkbox" class="input-key" id="front-f-key-input" onclick="changeImage('front-f-key'); addToList('front-f-key')">
                        <img id="front-f-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/front-f-key.png">
                    </div>

                    <div id="palm-d-key" class="key">
                        <input type="checkbox" class="input-key" id="palm-d-key-input" onclick="changeImage('palm-d-key'); addToList('palm-d-key')">
                        <img id="palm-d-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/palm-key.png">
                    </div>

                    <div id="palm-dsharp-key" class="key">
                        <input type="checkbox" class="input-key" id="palm-dsharp-key-input" onclick="changeImage('palm-dsharp-key'); addToList('palm-dsharp-key')">
                        <img id="palm-dsharp-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/palm-key.png">
                    </div>

                    <div id="palm-f-key" class="key">
                        <input type="checkbox" class="input-key" id="palm-f-key-input" onclick="changeImage('palm-f-key'); addToList('palm-f-key')">
                        <img id="palm-f-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/palm-key.png">
                    </div>

                    <div id="gsharp-key" class="key">
                        <input type="checkbox" class="input-key" id="gsharp-key-input" onclick="changeImage('gsharp-key'); addToList('gsharp-key')">
                        <img id="gsharp-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/gsharp-key.png">
                    </div>
                    
                    <div id="low-b-key" class="key">
                        <input type="checkbox" class="input-key" id="low-b-key-input" onclick="changeImage('low-b-key'); addToList('low-b-key')">
                        <img id="low-b-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/low-b-key.png">
                    </div>

                    <div id="low-bb-key" class="key">
                        <input type="checkbox" class="input-key" id="low-bb-key-input" onclick="changeImage('low-bb-key'); addToList('low-bb-key')">
                        <img id="low-bb-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/low-bb-key.png">
                    </div>

                    <div id="low-csharp-key" class="key">
                        <input type="checkbox" class="input-key" id="low-csharp-key-input" onclick="changeImage('low-csharp-key'); addToList('low-csharp-key')">
                        <img id="low-csharp-key-image" class="key-image" src="../../../../Images/Keys/Saxophone Keys/low-csharp-key.png">
                    </div>



                </div>
                <div id="reset-button-div">
                    <button id="reset-button" onclick="reset()">Reset</button>
                </div>
                <div id="apply-button-div">
                    <button id="apply-button" onclick="noteCompletedFunction()">Vérifier</button>
                </div>
            </div>
        </div>

        <div id="finishButton">
            <button onclick="finish()">Terminer</button>
        </div>


        <div id="start-button-div">
            <button id="start-button" onclick="showDifficulties()">Débuter</button>
        </div>
        <script src="Exercise1.js"></script>
    </body>
</html>
