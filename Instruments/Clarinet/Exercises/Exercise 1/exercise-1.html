<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="exercise-1.css">
        <link rel="stylesheet" href="../buttons.css">
        <title>Document</title>
    </head>
    <body>
        <div id="page-text-container">
            <div id="page-title">
                <h1>Exercice 1</h1>
            </div>
            <div id="page-description">
                <h2>Indiquer le doigté à partir de la note</h2>
            </div>
        </div>
        
        <div id="home-button">
            <a href="../../../../index.html"><img src="../../../../Images/home.png" height="40" draggable="false"></a>
        </div>

        <div>
            <div id="timer">
                00:00:00
            </div>
        </div>

        <div id="difficulties">
            <div id="difficulties-text-container">
                Choissisez votre difficulté
            </div>
            <div>
                <button id="easy-difficulty" class="fade-in" onclick="setDifficulty(`easy`); main()">Façile</button>
            </div>
            <div>
                <button id="medium-difficulty" class="fade-in" onclick="setDifficulty(`medium`); main()">Moyen</button>
            </div>
            <div>
                <button id="hard-difficulty" class="fade-in" onclick="setDifficulty(`hard`); main()">Difficile</button>
            </div>
        </div>

        <div id="start-button-container">
            <button id="start-button" class="fade-in" onclick="showDifficulties()">Débuter</button>
        </div>

        <div id="main-container">
            <div id="instrument-container" class="fade-in">
                <div id="note-text-container">
                    <p id="note-text">
                        display text 
                    </p>
                </div>
                <div id="score-text-container">
                    <p id="score-text">
                        score: 0/0
                    </p>
                </div>
                <div id="instrument-image">
                    <img src="../../Images/saxophone-fingerings.png" height="500px" draggable="false">
                </div>

                <!--Keys-->
                <div>
                    <img id="octave-key-image" class="key-image" src="../../Images/Clarinet Keys/octave-key.png" draggable="false" onclick="changeNoteImage(`octave-key`)">
                    <img id="thumb-key-image" class="key-image" src="../../Images/Clarinet Keys/thumb-key.png" draggable="false" onclick="changeNoteImage(`thumb-key`)">
                    <img id="key-1-image" class="key-image" src="../../Images/Clarinet Keys/key-1.png" draggable="false" onclick="changeNoteImage(`key-1`)">
                    <img id="key-2-image" class="key-image" src="../../Images/Clarinet Keys/key-2.png" draggable="false" onclick="changeNoteImage(`key-2`)">
                    <img id="key-3-image" class="key-image" src="../../Images/Clarinet Keys/key-3.png" draggable="false" onclick="changeNoteImage(`key-3`)">
                    <img id="key-4-image" class="key-image" src="../../Images/Clarinet Keys/key-4.png" draggable="false" onclick="changeNoteImage(`key-4`)">
                    <img id="key-5-image" class="key-image" src="../../Images/Clarinet Keys/key-5.png" draggable="false" onclick="changeNoteImage(`key-5`)">
                    <img id="key-6-image" class="key-image" src="../../Images/Clarinet Keys/key-6.png" draggable="false" onclick="changeNoteImage(`key-6`)">
                    <img id="A-key-image" class="key-image" src="../../Images/Clarinet Keys/A-key.png" draggable="false" onclick="changeNoteImage(`A-key`)">
                    <img id="G-sharp-key-image" class="key-image" src="../../Images/Clarinet Keys/G-sharp-key.png" draggable="false" onclick="changeNoteImage(`G-sharp-key`)">
                    <img id="D-sharp-key-image" class="key-image" src="../../Images/Clarinet Keys/D-sharp-key.png" draggable="false" onclick="changeNoteImage(`D-sharp-key`)">
                    <img id="C-sharp-key-image" class="key-image" src="../../Images/Clarinet Keys/C-sharp-key.png" draggable="false" onclick="changeNoteImage(`C-sharp-key`)">
                    <img id="B-key-image" class="key-image" src="../../Images/Clarinet Keys/B-key.png" draggable="false" onclick="changeNoteImage(`B-key`)">
                    <img id="side-1-image" class="key-image" src="../../Images/Clarinet Keys/side-1.png" draggable="false" onclick="changeNoteImage(`side-1`)">
                    <img id="side-2-image" class="key-image" src="../../Images/Clarinet Keys/side-2.png" draggable="false" onclick="changeNoteImage(`side-2`)">
                    <img id="side-3-image" class="key-image" src="../../Images/Clarinet Keys/side-3.png" draggable="false" onclick="changeNoteImage(`side-3`)">
                    <img id="side-4-image" class="key-image" src="../../Images/Clarinet Keys/side-4.png" draggable="false" onclick="changeNoteImage(`side-4`)">
                    <img id="F-left-key-image" class="key-image" src="../../Images/Clarinet Keys/F-left-key.png" draggable="false" onclick="changeNoteImage(`F-left-key`)">
                    <img id="F-sharp-left-key-image" class="key-image" src="../../Images/Clarinet Keys/F-sharp-left-key.png" draggable="false" onclick="changeNoteImage(`F-sharp-left-key`)">
                    <img id="E-left-key-image" class="key-image" src="../../Images/Clarinet Keys/E-left-key.png" draggable="false" onclick="changeNoteImage(`E-left-key`)">
                    <img id="F-right-key-image" class="key-image" src="../../Images/Clarinet Keys/F-right-key.png" draggable="false" onclick="changeNoteImage(`F-right-key`)">
                    <img id="F-sharp-right-key-image" class="key-image" src="../../Images/Clarinet Keys/F-sharp-right-key.png" draggable="false" onclick="changeNoteImage(`F-sharp-right-key`)">
                    <img id="E-right-key-image" class="key-image" src="../../Images/Clarinet Keys/E-right-key.png" draggable="false" onclick="changeNoteImage(`E-right-key`)">
                    <img id="G-sharp-right-key-image" class="key-image" src="../../Images/Clarinet Keys/G-sharp-right-key.png" draggable="false" onclick="changeNoteImage(`G-sharp-right-key`)">
                </div>
                <div id="reset-button-container">
                    <button id="reset-button" onclick="reset()">Réinitialiser</button>
                </div>
                <div id="apply-button-container">
                    <button id="apply-button" onclick="noteCompletedFunction()">Appliquer</button>
                </div>
                <div id="finish-button-container">
                    <button id="finish-button" onclick="finish()">Terminer</button>
                </div>
            </div>

        </div>

        <div id="finish-screen" class="fade-in">
            <p id="finish-screen-text">Voici vos résultats :</p>
            <p id="finish-screen-difficulty" class="finish-screen-info">difficulty</p>
            <p id="finish-screen-percentage" class="finish-screen-info">score</p>
            <p id="finish-screen-score" class="finish-screen-info">percentage</p>
            <div id="name-input-container">
                <input type="text" id="name-input" placeholder="saisir votre nom">
            </div>
        </div>
        <script src="exercise-1.js"></script>
    </body>
</html>
