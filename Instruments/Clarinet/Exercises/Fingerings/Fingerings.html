<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="fingerings.css">
        <title>Document</title>
    </head>
    <body>
        <div id="page-text-container">
            <div id="page-title">
                <h1>Revue des doigtées</h1>
            </div>
            <div id="page-description">
                <h2>Révision des doigtés</h2>
            </div>
        </div>
        
        <div id="home-button">
            <a href="../../../../index.html">
                <img src="../../../../Images/home.png" draggable="false" height="40">
            </a>
        </div>


        <div id="main-container">
            <div id="instrument-container" class="fade-in">
                <div id="note-text-container">
                    <p id="note-text">
                        Quel doigté voulez-vous réviser?
                    </p>
                </div>

                <div id="instrument-image">
                    <img src="../../Images/clarinet-fingerings.png" draggable="false" height="500px">
                </div>
                <div id="keys">
                    <img id="octave-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/octave-key.png" draggable="false"> <!--onclick="test(`octave-key-image`)">-->
                    <img id="thumb-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/thumb-key.png" draggable="false">
                    <img id="key-1-image" class="key-image key-activated" src="../../Images/Clarinet Keys/key-1.png" draggable="false">
                    <img id="key-2-image" class="key-image key-activated" src="../../Images/Clarinet Keys/key-2.png" draggable="false">
                    <img id="key-3-image" class="key-image key-activated" src="../../Images/Clarinet Keys/key-3.png" draggable="false">
                    <img id="key-4-image" class="key-image key-activated" src="../../Images/Clarinet Keys/key-4.png" draggable="false">
                    <img id="key-5-image" class="key-image key-activated" src="../../Images/Clarinet Keys/key-5.png" draggable="false">
                    <img id="key-6-image" class="key-image key-activated" src="../../Images/Clarinet Keys/key-6.png" draggable="false">
                    <img id="A-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/A-key.png" draggable="false">
                    <img id="G-sharp-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/G-sharp-key.png" draggable="false">
                    <img id="D-sharp-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/D-sharp-key.png" draggable="false">
                    <img id="C-sharp-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/C-sharp-key.png" draggable="false">
                    <img id="B-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/B-key.png" draggable="false">
                    <img id="side-1-image" class="key-image key-activated" src="../../Images/Clarinet Keys/side-1.png" draggable="false">
                    <img id="side-2-image" class="key-image key-activated" src="../../Images/Clarinet Keys/side-2.png" draggable="false">
                    <img id="side-3-image" class="key-image key-activated" src="../../Images/Clarinet Keys/side-3.png" draggable="false">
                    <img id="side-4-image" class="key-image key-activated" src="../../Images/Clarinet Keys/side-4.png" draggable="false">
                    <img id="F-left-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/F-left-key.png" draggable="false">
                    <img id="F-sharp-left-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/F-sharp-left-key.png" draggable="false">
                    <img id="E-left-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/E-left-key.png" draggable="false">
                    <img id="F-right-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/F-right-key.png" draggable="false">
                    <img id="F-sharp-right-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/F-sharp-right-key.png" draggable="false">
                    <img id="E-right-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/E-right-key.png" draggable="false">
                    <img id="G-sharp-right-key-image" class="key-image key-activated" src="../../Images/Clarinet Keys/G-sharp-right-key.png" draggable="false">

                </div>
                <div id="note-choice-container">
                    <select id="note-choice">
                    </select>
                </div>
                <div id="apply-button-container">
                    <button id="apply-button" onclick="manageInput()">Vérifier</button>
                </div>
            </div>
        </div>



        <script src="fingerings.js"></script>
    </body>
</html>
