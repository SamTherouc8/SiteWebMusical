<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
        <title>Site web musical</title>
    </head>

    <body>
        <div id="top">
            <div id="title1">
                <h1>Site Web Musical</h1>
            </div>
            <div id="title2">
                <h2>Pratique de doigtés musicaux</h2>
            </div>
        </div>
        

        <div id="home-button">
            <a href="index.html"><img src="Images/home.png" height="40"></a>
        </div>


        <div id="allInstruments">
            <!--Saxophone-->
            <div id="saxophoneBox" class="instrumentBox">
                <!--Name-->
                <div id="saxophoneName" class="instrumentName">
                    <p>Saxophone</p>
                </div>
                <!--Image-->
                <div class="instrumentImage">
                    <img src="Images/saxophone.png" alt="Image de saxophone" id="saxophoneImage">
                </div>
                <br>
                <!--Click button-->
                <div class="buttonContainer">
                    <a href="Instruments/Saxophone/saxophone.html">
                        <button class="clickButton">
                            Pratiquer
                        </button>
                    </a>
                </div>
                <br>
            </div>

            <!--Clarinet-->
            <div id="clarinetBox" class="instrumentBox">
                    <!--Name-->
                    <div id="clarinetName" class="instrumentName">
                        <p>Clarinette</p>
                    </div>
                    <!--Image-->
                    <div class="instrumentImage">
                        <img src="Images/clarinette.png" alt="Image de clarinette" id="clarinetImage">
                    </div>
                    <br>
                    <!--Click button-->
                    <div class="buttonContainer">
                        <a href="Instruments/Clarinet/clarinet.html">
                            <button class="clickButton">
                                Pratiquer
                            </button>
                        </a>
                    </div>
                    <br>
            </div>
          
            <!--Flute-->
            <div id="fluteBox" class="instrumentBox">
                <!--Name-->
                <div id="fluteName" class="instrumentName">
                    <p>Flute traversière</p>
                </div>
                <!--Image-->
                <div class="instrumentImage">
                    <img src="Images/flute.png" alt="Image de flute traversière" id="fluteImage">
                </div>
                <br>
                <!--Click button-->
                <div class="buttonContainer">
                    <a href="Instruments/Flute/flute.html">
                        <button class="clickButton">
                            Pratiquer
                        </button>
                    </a>
                </div>
                <br>
            </div>

            <!--Trumpet-->
            <div id="trumpetBox" class="instrumentBox">
                <!--Name-->
                <div id="trumpetName" class="instrumentName">
                    <p>Trompette</p>
                </div>
                <!--Image-->
                <div class="instrumentImage">
                    <img src="Images/trompette.png" alt="Image de trompette"  id="trumpetImage">
                </div>
                <br>
                <!--Click button-->
                <div class="buttonContainer">
                    <a href="Instruments/Trumpet/trumpet.html">
                        <button class="clickButton">
                            Pratiquer
                        </button>
                    </a>
                </div>    
                <br>              
            </div>

        </div>

    </body>
</html>
