<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
        <title>Site web musical</title>
    </head>

    <body>
        <div id="top">
            <div id="title1">
                <h1>Site Web Musical</h1>
            </div>
            <div id="title2">
                <h2>Pratique de doigtés musicaux</h2>
            </div>
        </div>
        
        <hr>
        <br>

        <div id="allInstruments">
          <!--First row-->
            <div id="row1" class="row">
                <!--Saxophone-->
                <div id="saxophoneBox" class="instrumentBox">
                    <!--Name-->
                    <div id="saxophoneName" class="instrumentName">
                        <p>Saxophone</p>
                    </div>
                    <!--Image-->
                    <div id="saxophoneImage" class="instrumentImage">
                        <img src="Images/saxophone.png" alt="Image de saxophone" height="330">
                    </div>
                    <!--Click button-->
                    <div class="clickButton">
                        <a href="Instruments/saxophone.html">
                            <button>
                                Pratiquer
                            </button>
                        </a>
                    </div>
                    <br>
                </div>

                <!--Clarinet-->
                <div id="clarinetBox" class="instrumentBox">
                    <!--Name-->
                    <div id="clarinetName" class="instrumentName">
                        <p>Clarinette</p>
                    </div>
                    <!--Image-->
                    <div id="clarinetImage" class="instrumentImage">
                        <img src="Images/clarinette.png" alt="Image de clarinette" height="330">
                    </div>
                    <!--Click button-->
                    <div class="clickButton">
                        <a href="Instruments/clarinet.html">
                            <button>
                                Pratiquer
                            </button>
                        </a>
                    </div>
                    <br>
                </div>
           </div>

           <br>

          <!--Second row-->
            <div id="row2" class="row">
                <!--Flute-->
                <div id="fluteBox" class="instrumentBox">
                    <!--Name-->
                    <div id="fluteImage" class="instrumentName">
                        <p>Flute traversière</p>
                    </div>
                    <!--Image-->
                    <div id="fluteImage" class="instrumentImage">
                        <img src="Images/flute.png" alt="Image de flute traversière" height="153">
                    </div>
                    <!--Click button-->
                    <div class="clickButton">
                        <a href="Instruments/flute.html">
                            <button>
                                Pratiquer
                            </button>
                        </a>
                    </div>
                    <br>
                </div>

                <!--Trumpet-->
                <div id="trumpetBox" class="instrumentBox">
                    <!--Name-->
                    <div id="fluteImage" class="instrumentName">
                        <p>Trompette</p>
                    </div>
                    <!--Image-->
                    <div id="trumpetImage" class="instrumentImage">
                        <img src="Images/trompette.png" alt="Image de trompette"  height="153">
                    </div>
                    <!--Click button-->
                    <div class="clickButton">
                        <a href="Instruments/trumpet.html">
                            <button>
                                Pratiquer
                            </button>
                        </a>
                    </div>    
                    <br>              
                </div>
            </div>

        </div>

    </body>
</html>
